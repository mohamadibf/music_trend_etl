x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: "zTJxoVBPQMsEJCrxkVWpxN7M8c6VZzXtj3qD_y2Y7nA="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # Last.fm
    LASTFM_API_KEY: ${LASTFM_API_KEY}
    # Kafka
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    # MinIO
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: music-trends-etl
    # PostgreSQL Gold
    POSTGRES_GOLD_HOST: postgres-gold
    POSTGRES_GOLD_PORT: 5432
    POSTGRES_GOLD_DB: music_trends_db
    POSTGRES_GOLD_USER: gold
    POSTGRES_GOLD_PASSWORD: gold123
    # Flink
    FLINK_JOBMANAGER_URL: http://flink-jobmanager:8081
    # Packages installés 
    _PIP_ADDITIONAL_REQUIREMENTS: "boto3 requests pandas pyarrow sqlalchemy psycopg2-binary confluent-kafka"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./flink-jobs:/opt/airflow/flink-jobs
    - airflow_logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres-airflow:
      condition: service_healthy

services:
  # ─── ZOOKEEPER ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ─── KAFKA BROKER ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── KAFKA UI (monitoring des topics) ───────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: music-etl-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── KAFKA INIT (création des topics) ───────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --topic raw-artists     --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic raw-tracks      --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic raw-tags        --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic raw-geo         --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic silver-charts   --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic silver-artists  --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic gold-kpis       --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
      echo 'Topics Kafka créés avec succès'
      "

  # ─── FLINK JOBMANAGER ───────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        parallelism.default: 2
    volumes:
      - ./flink-jobs:/opt/flink/jobs
      - flink_checkpoints:/opt/flink/checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── FLINK TASKMANAGER ──────────────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
    volumes:
      - ./flink-jobs:/opt/flink/jobs
      - flink_checkpoints:/opt/flink/checkpoints
    restart: unless-stopped

  # ─── MINIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/music-trends-etl;
      echo 'Bucket music-trends-etl créé';
      "

  # ─── AIRFLOW ────────────────────────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 50
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username airflow --firstname Airflow --lastname Admin \
          --role Admin --email admin@example.com --password airflow
        echo "Airflow initialisé"
    restart: on-failure

  # ─── POSTGRESQL GOLD ────────────────────────────────────────────────────────
  postgres-gold:
    image: postgres:15
    container_name: postgres-gold
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold123
      POSTGRES_DB: music_trends_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_gold_data:/var/lib/postgresql/data
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gold", "-d", "music_trends_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ─── POSTGRESQL METABASE (base interne Metabase, séparée de la base Gold) ──
  postgres-metabase:
    image: postgres:15
    container_name: postgres-metabase
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase123
      POSTGRES_DB: metabase_db
    volumes:
      - postgres_metabase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "metabase", "-d", "metabase_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ─── METABASE ───────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase123
      MB_DB_HOST: postgres-metabase
    depends_on:
      postgres-metabase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zookeeper_data:
  kafka_data:
  minio_data:
  postgres_airflow_data:
  postgres_gold_data:
  postgres_metabase_data:
  flink_checkpoints:
  airflow_logs:
